name: Release add-on (Firefox + Chrome/Edge)

# Trigger by pushing a version tag that matches manifest.json, e.g.:
#   git tag v1.1 && git push origin v1.1
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the Release and commit the regenerated updates.json

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Checks out the tagged commit (the push ref), so what gets verified and
      # signed is exactly what was tagged — not whatever main's HEAD happens to
      # be. main is checked out separately later, only to commit updates.json.
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # The tag (v1.1) must match the version inside manifest.json (1.1).
      - name: Verify tag matches manifest version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST=$(node -p "require('./manifest.json').version")
          echo "tag=$TAG manifest=$MANIFEST"
          if [ "$TAG" != "$MANIFEST" ]; then
            echo "::error::Tag v$TAG does not match manifest.json version $MANIFEST"
            exit 1
          fi

      - name: Sign the add-on with Mozilla (unlisted / self-distributed)
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          npx --yes web-ext@latest sign \
            --channel=unlisted \
            --api-key="$AMO_JWT_ISSUER" \
            --api-secret="$AMO_JWT_SECRET" \
            --source-dir=. \
            --artifacts-dir=dist \
            --ignore-files \
              "README.md" "updates.json" "dist/**" "scripts/**" \
              ".github/**" ".gitignore" "*.xpi" "*.zip"

      # web-ext names the signed file with underscores; normalise it to the name
      # that updates.json + the Release asset URL expect.
      - name: Normalise signed filename
        id: xpi
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SIGNED=$(ls dist/*.xpi | head -1)
          FINAL="dist/homework-sheets-${VERSION}.xpi"
          mv "$SIGNED" "$FINAL"
          HASH=$(sha256sum "$FINAL" | cut -d' ' -f1)
          echo "version=$VERSION"     >> "$GITHUB_OUTPUT"
          echo "file=$FINAL"          >> "$GITHUB_OUTPUT"
          echo "hash=$HASH"           >> "$GITHUB_OUTPUT"

      - name: Publish signed .xpi to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Idempotent: a release for this tag may already exist (e.g. created
          # by hand, or by a previous run). Create it only if missing, then
          # attach/overwrite the signed .xpi either way.
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; uploading asset."
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes "Signed Firefox add-on ${{ steps.xpi.outputs.version }}."
          fi
          gh release upload "$GITHUB_REF_NAME" \
            "${{ steps.xpi.outputs.file }}" --clobber

      # Point Firefox's update check at the new signed build. The manifest lives
      # on main (that's where update_url points), so switch to main just for this
      # commit — dist/ is gitignored, so the signed .xpi survives the switch.
      - name: Update updates.json and commit to main
        run: |
          git fetch origin main
          git checkout -B main origin/main

          VERSION="${{ steps.xpi.outputs.version }}"
          HASH="${{ steps.xpi.outputs.hash }}"
          REPO="${{ github.repository }}"
          LINK="https://github.com/${REPO}/releases/download/v${VERSION}/homework-sheets-${VERSION}.xpi"
          cat > updates.json <<EOF
          {
            "addons": {
              "homework-sheets@eurognosi-fni.com": {
                "updates": [
                  {
                    "version": "${VERSION}",
                    "update_link": "${LINK}",
                    "update_hash": "sha256:${HASH}"
                  }
                ]
              }
            }
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add updates.json
          git commit -m "Release v${VERSION}: update Firefox update manifest" || echo "no changes"
          # main may have moved since the fetch above — rebase and retry once
          git push origin main || { git pull --rebase origin main && git push origin main; }

  chrome:
    runs-on: ubuntu-latest
    steps:
      # Checks out the tagged commit, so what gets packaged and published is
      # exactly what was tagged.
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # The tag (v1.1) must match the version inside manifest.json (1.1).
      - name: Verify tag matches manifest version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST=$(node -p "require('./manifest.json').version")
          echo "tag=$TAG manifest=$MANIFEST"
          if [ "$TAG" != "$MANIFEST" ]; then
            echo "::error::Tag v$TAG does not match manifest.json version $MANIFEST"
            exit 1
          fi

      - name: Build the Chrome/Edge upload zip
        run: ./scripts/build-zip.sh

      # Uploads the new version to the existing Chrome Web Store item and
      # publishes it. The item must be created once by hand first (see README) so
      # CHROME_EXTENSION_ID and the OAuth credentials exist. --auto-publish sends
      # it straight to publishing; for an unlisted item that means it goes live
      # (still only reachable by direct link) after Google's review.
      - name: Upload & publish to the Chrome Web Store
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          npx --yes chrome-webstore-upload-cli@3 upload \
            --source "dist/homework-sheets-${VERSION}.zip" \
            --auto-publish
